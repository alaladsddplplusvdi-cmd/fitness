<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker • Dark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .tracker-container {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7), 0 0 0 1px #333 inset;
            width: 100%;
            max-width: 400px;
        }

        .title {
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.2rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            color: #bbb;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            background: #0f0f0f;
            border: 1px solid #444;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1.2rem;
            color: #fff;
            outline: none;
            transition: border 0.2s;
        }

        .input-field:focus {
            border-color: #00ff99;
            box-shadow: 0 0 10px #00ff9966;
        }

        .track-btn {
            width: 100%;
            background: #2a2a2a;
            border: none;
            border-radius: 60px;
            padding: 16px 20px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #e0e0e0;
            cursor: pointer;
            box-shadow: 0 5px 0 #0f0f0f, 0 8px 12px rgba(0, 0, 0, 0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 30px;
        }

        .track-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f0f0f, 0 5px 8px rgba(0, 0, 0, 0.5);
        }

        .track-btn:hover {
            background: #3a3a3a;
        }

        .result-box {
            background: #0f0f0f;
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            border: 1px solid #444;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ff99;
            text-shadow: 0 0 10px #00ff9966;
            word-break: break-word;
        }

        .error-message {
            color: #ff6666;
            font-size: 0.9rem;
            margin-top: 8px;
            min-height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="tracker-container">
        <div class="title">⚡ Fitness Tracker ⚡</div>

        <div class="input-group">
            <label class="label">Шаги (steps)</label>
            <input type="number" id="steps" class="input-field" value="0" min="0" step="1">
        </div>

        <div class="input-group">
            <label class="label">Дистанция (км)</label>
            <input type="number" id="distance" class="input-field" value="0.0" min="0" step="0.1">
        </div>

        <button class="track-btn" id="trackBtn">⟫ Рассчитать</button>

        <div class="result-box">
            <div class="result-value" id="result">0.00 ккал</div>
        </div>
        <div class="error-message" id="error"></div>
    </div>

    <script>
        (function() {
            const stepsInput = document.getElementById('steps');
            const distanceInput = document.getElementById('distance');
            const trackBtn = document.getElementById('trackBtn');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');

            // Коэффициенты (как в Java)
            const CALORIES_PER_STEP = 0.04;
            const CALORIES_PER_KM = 0.1;

            function calculateCalories(steps, distance) {
                return (steps * CALORIES_PER_STEP) + (distance * CALORIES_PER_KM);
            }

            function formatNumber(value) {
                return value.toFixed(2);
            }

            function handleTrack() {
                const stepsStr = stepsInput.value.trim();
                const distanceStr = distanceInput.value.trim();

                if (stepsStr === '' || distanceStr === '') {
                    errorDiv.textContent = 'Заполните оба поля!';
                    resultDiv.textContent = '0.00 ккал';
                    return;
                }

                const steps = parseInt(stepsStr, 10);
                const distance = parseFloat(distanceStr);

                if (isNaN(steps) || isNaN(distance) || steps < 0 || distance < 0) {
                    errorDiv.textContent = 'Введите корректные положительные числа!';
                    resultDiv.textContent = '0.00 ккал';
                    return;
                }

                const calories = calculateCalories(steps, distance);
                resultDiv.textContent = formatNumber(calories) + ' ккал';
                errorDiv.textContent = '';
            }

            trackBtn.addEventListener('click', handleTrack);
            // Разрешить ввод с клавиатуры (Enter)
            [stepsInput, distanceInput].forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleTrack();
                });
            });

            // Начальное состояние
            resultDiv.textContent = '0.00 ккал';
        })();
    </script>
</body>
</html>
