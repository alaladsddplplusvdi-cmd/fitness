<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker • Dark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7), inset 0 0 0 1px #333;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.2rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .label {
            display: block;
            color: #bbb;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .input-field {
            width: 100%;
            background: #0f0f0f;
            border: 1px solid #444;
            border-radius: 60px;
            padding: 14px 20px;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
            transition: border 0.2s;
        }
        .input-field:focus {
            border-color: #00ff99;
            box-shadow: 0 0 8px #00ff9966;
        }
        .btn {
            width: 100%;
            background: #2a2a2a;
            border: none;
            border-radius: 60px;
            padding: 16px 20px;
            color: #e0e0e0;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f0f0f;
            transition: 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0 25px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f0f0f;
        }
        .btn:hover {
            background: #3a3a3a;
        }
        .result-box {
            background: #0f0f0f;
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            border: 1px solid #444;
        }
        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00ff99;
            text-shadow: 0 0 8px #00ff9966;
            word-break: break-word;
        }
        .error {
            color: #ff6666;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 8px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fitness Tracker</h2>

        <div class="input-group">
            <label class="label">Steps</label>
            <input type="number" id="steps" class="input-field" value="0" min="0" step="1">
        </div>

        <div class="input-group">
            <label class="label">Distance (km)</label>
            <input type="number" id="distance" class="input-field" value="0.0" min="0" step="0.1">
        </div>

        <button class="btn" id="trackBtn">Calculate</button>

        <div class="result-box">
            <div class="result-value" id="result">0.00 kcal</div>
        </div>
        <div class="error" id="error"></div>
    </div>

    <script>
        (function() {
            const stepsInput = document.getElementById('steps');
            const distanceInput = document.getElementById('distance');
            const trackBtn = document.getElementById('trackBtn');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');

            const CAL_PER_STEP = 0.04;
            const CAL_PER_KM = 0.1;

            function calculate() {
                const stepsStr = stepsInput.value.trim();
                const distStr = distanceInput.value.trim();

                if (stepsStr === '' || distStr === '') {
                    errorDiv.textContent = 'Fill in both fields';
                    resultDiv.textContent = '0.00 kcal';
                    return;
                }

                const steps = parseInt(stepsStr, 10);
                const dist = parseFloat(distStr);

                if (isNaN(steps) || isNaN(dist) || steps < 0 || dist < 0) {
                    errorDiv.textContent = 'Invalid positive numbers';
                    resultDiv.textContent = '0.00 kcal';
                    return;
                }

                const calories = (steps * CAL_PER_STEP) + (dist * CAL_PER_KM);
                resultDiv.textContent = calories.toFixed(2) + ' kcal';
                errorDiv.textContent = '';
            }

            trackBtn.addEventListener('click', calculate);
            [stepsInput, distanceInput].forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') calculate();
                });
            });

            // начальное отображение
            calculate();
        })();
    </script>
</body>
</html>
